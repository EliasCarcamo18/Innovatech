<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Innovatech Chile - Ventas y Despachos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #0f766e;
      color: white;
      padding: 18px;
      text-align: center;
    }

    main {
      max-width: 1100px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    button {
      padding: 8px 14px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      background: #0f766e;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      margin-bottom: 30px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #e5e7eb;
    }

    input {
      padding: 7px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .ok {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>
  <header>
    <h1>Innovatech Chile</h1>
    <p>Dashboard de ventas y despachos desplegado en AWS EKS</p>
  </header>

  <main>
    <section>
      <h2>Ventas</h2>
      <button onclick="cargarVentas()">Cargar ventas</button>
      <table>
        <thead>
          <tr>
            <th>ID Venta</th>
            <th>Dirección</th>
            <th>Valor</th>
            <th>Fecha</th>
            <th>Despacho generado</th>
          </tr>
        </thead>
        <tbody id="tablaVentas"></tbody>
      </table>
    </section>

    <section>
      <h2>Crear venta</h2>
      <input id="direccionCompra" placeholder="Dirección de compra" />
      <input id="valorCompra" type="number" placeholder="Valor compra" />
      <input id="fechaCompra" type="date" />
      <button onclick="crearVenta()">Crear venta</button>
    </section>

    <section>
      <h2>Despachos</h2>
      <button onclick="cargarDespachos()">Cargar despachos</button>
      <table>
        <thead>
          <tr>
            <th>ID Despacho</th>
            <th>ID Compra</th>
            <th>Dirección</th>
            <th>Fecha despacho</th>
            <th>Patente</th>
            <th>Intento</th>
            <th>Despachado</th>
          </tr>
        </thead>
        <tbody id="tablaDespachos"></tbody>
      </table>
    </section>

    <div id="status" class="status"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
