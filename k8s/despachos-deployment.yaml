apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-despachos
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-despachos
  template:
    metadata:
      labels:
        app: innovatech-despachos
    spec:
      containers:
        - name: despachos
          image: 578313522238.dkr.ecr.us-east-1.amazonaws.com/innovatech-despachos:eks-v1
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_ENDPOINT
              value: "innovatech-db"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "innovatech_db"
            - name: DB_USERNAME
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
