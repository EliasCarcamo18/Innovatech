apiVersion: v1
kind: Service
metadata:
  name: innovatech-frontend
  namespace: innovatech
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: innovatech-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80